<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Knowledge Graph</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #080c12;
    --surface:      #0f1520;
    --surface2:     #161e2e;
    --border:       rgba(255,255,255,0.06);
    --text:         #e8edf5;
    --text-muted:   #6b7a94;
    --text-dim:     #3d4a60;

    --c-major:      #4f9eff;
    --c-emerging:   #34d399;
    --c-cdmo:       #a78bfa;
    --c-trend:      #fbbf24;
    --c-risk:       #f87171;
    --c-insight:    #e879f9;
    --c-deal:       #38bdf8;
    --c-bottleneck: #fb923c;
    --c-opportunity:#6ee7b7;
    --c-stage:      #818cf8;

    --panel-w: 400px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── HEADER ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    height: 52px;
    background: rgba(8,12,18,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 20px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .logo span { color: var(--c-insight); }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
    flex: 1;
  }

  .filter-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .15s ease;
    white-space: nowrap;
  }
  .filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.18); }
  .filter-btn.active { color: #000; border-color: transparent; }
  .filter-btn[data-type="all"].active              { background: var(--text); }
  .filter-btn[data-type="company_major"].active    { background: var(--c-major); }
  .filter-btn[data-type="company_emerging"].active { background: var(--c-emerging); }
  .filter-btn[data-type="cdmo"].active             { background: var(--c-cdmo); }
  .filter-btn[data-type="trend"].active            { background: var(--c-trend); }
  .filter-btn[data-type="risk"].active             { background: var(--c-risk); }
  .filter-btn[data-type="deal"].active             { background: var(--c-deal); }
  .filter-btn[data-type="insight"].active          { background: var(--c-insight); }

  .header-meta {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  .node-count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* ── CANVAS ── */
  #graph {
    position: fixed;
    inset: 52px 0 0 0;
    overflow: hidden;
  }

  svg { width: 100%; height: 100%; }

  .link {
    stroke: rgba(255,255,255,0.05);
    stroke-width: 1px;
    fill: none;
  }
  .link.highlighted {
    stroke: rgba(255,255,255,0.22);
    stroke-width: 1.5px;
  }

  .node circle {
    stroke-width: 1.5px;
    cursor: pointer;
    transition: r .2s ease, filter .2s ease;
  }
  .node circle:hover { filter: brightness(1.25); }
  .node.faded { opacity: 0.12; pointer-events: none; }
  .node.selected circle { stroke-width: 2.5px; filter: brightness(1.3) drop-shadow(0 0 10px currentColor); }

  .node-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 10.5px;
    font-weight: 400;
    fill: rgba(200,210,225,0.75);
    pointer-events: none;
    paint-order: stroke;
    stroke: var(--bg);
    stroke-width: 3px;
    stroke-linejoin: round;
  }
  .node-label.root-label {
    font-size: 13px;
    font-weight: 600;
    fill: #fff;
  }

  /* ── DETAIL PANEL ── */
  #panel {
    position: fixed;
    top: 52px; right: 0; bottom: 0;
    width: var(--panel-w);
    background: var(--surface);
    border-left: 1px solid var(--border);
    transform: translateX(100%);
    transition: transform .3s cubic-bezier(.22,.68,0,1.2);
    display: flex;
    flex-direction: column;
    z-index: 90;
    overflow: hidden;
  }
  #panel.open { transform: translateX(0); }

  .panel-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .panel-type-badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 10px;
    display: inline-block;
    font-weight: 700;
  }

  .panel-title {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 6px;
  }

  .panel-close {
    position: absolute;
    top: 14px; right: 14px;
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all .15s;
  }
  .panel-close:hover { background: var(--surface2); color: var(--text); }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .panel-section {
    margin-bottom: 18px;
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .panel-text {
    font-size: 13px;
    line-height: 1.65;
    color: rgba(200,210,230,0.85);
  }

  /* ── REASONING BLOCK ── */
  .reasoning-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }
  .reasoning-block::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }
  .reasoning-block.major::before   { background: var(--c-major); }
  .reasoning-block.emerging::before { background: var(--c-emerging); }
  .reasoning-block .reasoning-text {
    font-size: 13px;
    line-height: 1.7;
    color: rgba(200,215,235,0.9);
    padding-left: 4px;
  }

  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }

  .tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    line-height: 1.4;
  }

  .deal-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 6px;
  }
  .deal-card .deal-parties {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--c-deal);
    margin-bottom: 6px;
  }
  .deal-card .deal-value {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .deal-card .deal-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.55;
  }

  .conn-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    font-size: 12px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }
  .conn-item:last-child { border-bottom: none; }
  .conn-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── LEGEND ── */
  #legend {
    position: fixed;
    bottom: 16px; left: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px 16px;
    padding: 10px 14px;
    background: rgba(8,12,18,0.85);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 11px;
    max-width: 480px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 5px;
    color: var(--text-muted);
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ── HINT ── */
  #hint {
    position: fixed;
    bottom: 16px; right: 16px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
  }

  /* ── LOADING ── */
  #loading {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 999;
    gap: 14px;
    transition: opacity .4s ease;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--c-insight);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Building knowledge graph...</div>
</div>

<header>
  <div class="logo">DRUG<span>.</span>PARADIGM</div>
  <div class="filters" id="filters"></div>
  <div class="header-meta">
    <span class="node-count" id="nodeCount">— nodes</span>
  </div>
</header>

<div id="graph"></div>

<div id="panel">
  <button class="panel-close" id="panelClose">✕</button>
  <div class="panel-header">
    <div class="panel-type-badge" id="panelBadge"></div>
    <div class="panel-title" id="panelTitle"></div>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--c-insight)"></div>Insight / Root</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c-major)"></div>Major Pharma</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c-emerging)"></div>Emerging Biotech</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c-cdmo)"></div>CDMO / Platform</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c-trend)"></div>Transition / Pattern</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c-risk)"></div>Risk</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c-deal)"></div>Key Deal</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c-bottleneck)"></div>Bottleneck</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c-stage)"></div>Stage</div>
</div>

<div id="hint">Click node · Drag to rearrange · Scroll to zoom</div>

<script>
const TYPE_COLOR = {
  insight:          'var(--c-insight)',
  company_major:    'var(--c-major)',
  company_emerging: 'var(--c-emerging)',
  cdmo:             'var(--c-cdmo)',
  trend:            'var(--c-trend)',
  risk:             'var(--c-risk)',
  deal:             'var(--c-deal)',
  bottleneck:       'var(--c-bottleneck)',
  opportunity:      'var(--c-opportunity)',
  stage:            'var(--c-stage)',
};

const TYPE_LABEL = {
  all:              'All',
  insight:          'Insights',
  company_major:    'Major Pharma',
  company_emerging: 'Emerging Biotech',
  cdmo:             'CDMO / Platform',
  trend:            'Transitions',
  risk:             'Risks',
  deal:             'Key Deals',
  bottleneck:       'Bottlenecks',
  stage:            'Stage',
};

const FILTER_ORDER = ['all','company_major','company_emerging','cdmo','trend','risk','deal','insight'];

let allNodes = [], allEdges = [], graphMeta = {};
let simulation, svg, linkSel, nodeSel, labelSel;
let activeFilter = 'all';
let selectedId = null;

// ── FETCH DATA ────────────────────────────────────────────────────────────────
// Read ?modality= from URL so each card on the dashboard opens its own graph
const _urlParams   = new URLSearchParams(window.location.search);
const _modalityParam = _urlParams.get('modality') || '';

// DrugParadigm uses /api/modality/{key}/graph  (key uses underscores)
// The ?modality= param may be a label like "Monoclonal Antibodies" or a key like "monoclonal_antibodies"
function _labelToKey(label) {
  return label.toLowerCase().replace(/ /g, '_');
}
const _modalityKey = _modalityParam ? _labelToKey(_modalityParam) : '';
const _apiUrl = _modalityKey
  ? `/api/modality/${encodeURIComponent(_modalityKey)}/graph`
  : '/api/modality/monoclonal_antibodies/graph';

// Update page title + logo text with modality name
if (_modalityParam) {
  document.title = _modalityParam + ' — DrugParadigm';
  const logoEl = document.querySelector('.logo');
  if (logoEl) logoEl.innerHTML = `DRUG<span>.</span>${_modalityParam.toUpperCase().replace(/ /g,'&nbsp;')}`;
}

fetch(_apiUrl)
  .then(r => r.json())
  .then(data => {
    if (!data.nodes || data.nodes.length === 0) {
      const msg  = data.message || `No data yet for "${_modalityParam || 'this modality'}"`;
      const load = document.getElementById('loading');
      load.innerHTML = `
        <div style="text-align:center;max-width:400px;padding:0 20px">
          <div style="font-size:28px;margin-bottom:16px;opacity:0.4">◈</div>
          <div style="font-family:'Space Mono',monospace;font-size:13px;
                      color:#e8edf5;margin-bottom:8px;letter-spacing:0.04em">
            ${_modalityParam || 'This modality'}
          </div>
          <div style="font-size:13px;color:#6b7a94;line-height:1.6;margin-bottom:24px">
            ${msg}
          </div>
          <a href="/" style="display:inline-flex;align-items:center;gap:6px;
                             background:#e879f915;border:1px solid #e879f940;
                             color:#e879f9;padding:8px 18px;border-radius:6px;
                             font-size:12px;text-decoration:none;">
            ← Back to Dashboard
          </a>
        </div>`;
      load.style.opacity = '1';
      return;
    }
    allNodes = data.nodes;
    allEdges = data.edges;
    graphMeta = data.meta || {};
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 400);
    // Show modality name from meta if available
    const modalityLabel = graphMeta.modality_name || _modalityParam || '—';
    document.getElementById('nodeCount').textContent =
      `${modalityLabel}  ·  ${allNodes.length} nodes · ${allEdges.length} edges`;
    buildFilters();
    buildGraph();
  })
  .catch(err => {
    document.querySelector('.loading-text').textContent = 'Error loading data';
    console.error(err);
  });

// ── FILTERS ───────────────────────────────────────────────────────────────────
function buildFilters() {
  const container = document.getElementById('filters');
  FILTER_ORDER.forEach(type => {
    if (type !== 'all' && !allNodes.some(n => n.type === type)) return;
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (type === 'all' ? ' active' : '');
    btn.dataset.type = type;
    btn.textContent = TYPE_LABEL[type] || type;
    btn.onclick = () => {
      activeFilter = type;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
      applyFilter();
    };
    container.appendChild(btn);
  });
}

function applyFilter() {
  closePanel();
  selectedId = null;
  if (activeFilter === 'all') {
    nodeSel.classed('faded', false);
    linkSel.classed('highlighted', false).style('stroke', 'rgba(255,255,255,0.05)');
  } else {
    const visIds = new Set(allNodes.filter(n => n.type === activeFilter).map(n => n.id));
    nodeSel.classed('faded', d => !visIds.has(d.id));
    linkSel.style('stroke', l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      return (visIds.has(s) || visIds.has(t)) ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.02)';
    });
  }
}

// ── BUILD GRAPH ───────────────────────────────────────────────────────────────
function buildGraph() {
  const container = document.getElementById('graph');
  const W = container.clientWidth;
  const H = container.clientHeight;

  const svgEl = d3.select('#graph').append('svg')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .call(d3.zoom().scaleExtent([0.2, 4]).on('zoom', e => {
      g.attr('transform', e.transform);
    }));

  svgEl.append('defs').append('radialGradient')
    .attr('id', 'bgGrad')
    .attr('cx', '50%').attr('cy', '50%').attr('r', '50%')
    .selectAll('stop')
    .data([
      { offset: '0%',   color: '#0d1626' },
      { offset: '100%', color: '#080c12' },
    ])
    .enter().append('stop')
    .attr('offset', d => d.offset)
    .attr('stop-color', d => d.color);

  svgEl.insert('rect', ':first-child')
    .attr('width', W).attr('height', H)
    .attr('fill', 'url(#bgGrad)');

  const g = svgEl.append('g');
  svg = svgEl;

  const nodes = allNodes.map(n => ({ ...n }));
  const nodeById = {};
  nodes.forEach(n => nodeById[n.id] = n);

  const edges = allEdges.map(([s, t]) => ({
    source: nodeById[s],
    target: nodeById[t],
  })).filter(e => e.source && e.target);

  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(edges).id(d => d.id).distance(d => {
      if (d.source.type === 'company_emerging' || d.target.type === 'company_emerging') {
    return 120; // tighter for emerging biotech
  }
      const isRoot = d.source.type === 'insight' || d.target.type === 'insight';
      return isRoot ? 270 : 205;
    }).strength(0.3))
    .force('charge', d3.forceManyBody().strength(d => {
      if (d.type === 'company_emerging') return -180; 
      const s = { insight: -900, company_major: -500, deal: -400 };
      return s[d.type] || -400;   // less push → closer clusters
    }))
    .force('center', d3.forceCenter(W / 2, H / 2).strength(0.08))
    .force('collision', d3.forceCollide(d => d.size + 18))
    .force('x', d3.forceX(W / 2).strength(0.03))
    .force('y', d3.forceY(H / 2).strength(0.03))
    .force('emergingPull', d3.forceRadial(d => {
  return d.type === 'company_emerging' ? 150 : 260;
}, W / 2, H / 2).strength(d => {
  return d.type === 'company_emerging' ? 0.3 : 0.05;
}));
    
  linkSel = g.append('g').selectAll('line')
    .data(edges)
    .enter().append('line')
    .attr('class', 'link');

  const nodeG = g.append('g').selectAll('g.node')
    .data(nodes)
    .enter().append('g')
    .attr('class', 'node')
    .attr('data-id', d => d.id)
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end',   (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    )
    .on('click', (e, d) => { e.stopPropagation(); selectNode(d, nodes, edges); });

  nodeG.append('circle')
    .attr('r', d => d.size)
    .attr('fill', d => colorOf(d.type) + '22')
    .attr('stroke', d => colorOf(d.type));

  labelSel = g.append('g').selectAll('text')
    .data(nodes)
    .enter().append('text')
    .attr('class', d => 'node-label' + (d.extra_type === 'root' ? ' root-label' : ''))
    .attr('text-anchor', 'middle')
    .attr('dy', d => d.size + 18)
    .text(d => d.label.length > 30 ? d.label.slice(0, 28) + '…' : d.label);

  nodeSel = nodeG;

  simulation.on('tick', () => {
    linkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeG.attr('transform', d => `translate(${d.x},${d.y})`);
    labelSel.attr('x', d => d.x).attr('y', d => d.y);
  });

  svgEl.on('click', () => { closePanel(); clearHighlights(); selectedId = null; });
}

function colorOf(type) {
  const m = {
    insight:          '#e879f9',
    company_major:    '#4f9eff',
    company_emerging: '#34d399',
    cdmo:             '#a78bfa',
    trend:            '#fbbf24',
    risk:             '#f87171',
    deal:             '#38bdf8',
    bottleneck:       '#fb923c',
    opportunity:      '#6ee7b7',
    stage:            '#818cf8',
  };
  return m[type] || '#6b7a94';
}

// ── SELECT NODE ───────────────────────────────────────────────────────────────
function selectNode(node, nodes, edges) {
  selectedId = node.id;

  const connectedIds = new Set([node.id]);
  edges.forEach(e => {
    const s = typeof e.source === 'object' ? e.source.id : e.source;
    const t = typeof e.target === 'object' ? e.target.id : e.target;
    if (s === node.id) connectedIds.add(t);
    if (t === node.id) connectedIds.add(s);
  });

  nodeSel.classed('faded', d => !connectedIds.has(d.id));
  nodeSel.classed('selected', d => d.id === node.id);
  linkSel.classed('highlighted', l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    return s === node.id || t === node.id;
  });

  openPanel(node, nodes, edges, connectedIds);
}

function clearHighlights() {
  if (nodeSel) {
    nodeSel.classed('faded', false).classed('selected', false);
    linkSel.classed('highlighted', false).style('stroke', 'rgba(255,255,255,0.05)');
  }
  if (activeFilter !== 'all') applyFilter();
}

// ── PANEL ─────────────────────────────────────────────────────────────────────
function openPanel(node, nodes, edges, connectedIds) {
  const panel = document.getElementById('panel');
  const badge = document.getElementById('panelBadge');
  const title = document.getElementById('panelTitle');
  const body  = document.getElementById('panelBody');

  const color = colorOf(node.type);
  badge.textContent = TYPE_LABEL[node.type] || node.type;
  badge.style.background = color + '22';
  badge.style.color = color;
  badge.style.border = `1px solid ${color}44`;

  title.textContent = node.label;
  body.innerHTML = '';

  const isMajor    = node.extra_type === 'major_player';
  const isEmerging = node.extra_type === 'emerging_player';
  const isCompany  = isMajor || isEmerging;

  // ── WHY KEY PLAYER (reasoning) — shown first for company nodes ────────────
  if (isCompany && node.reasoning) {
    const cls = isMajor ? 'major' : 'emerging';
    const label = isMajor ? 'Why Major Player' : 'Why Emerging Player';
    body.appendChild(section(label,
      `<div class="reasoning-block ${cls}">
         <p class="reasoning-text">${esc(node.reasoning)}</p>
       </div>`
    ));
  }

  // ── OVERVIEW / DESCRIPTION ────────────────────────────────────────────────
  // For company nodes: if reasoning was the desc, skip duplicate; otherwise show desc
  if (node.desc && !(isCompany && node.desc === node.reasoning)) {
    body.appendChild(section('Overview', `<p class="panel-text">${esc(node.desc)}</p>`));
  }

  // ── TAGS / SIGNALS ────────────────────────────────────────────────────────
  if (node.tags && node.tags.length) {
    const tags = node.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('');
    body.appendChild(section('Signals', `<div class="tag-list">${tags}</div>`));
  }

  // ── DEAL CARD ─────────────────────────────────────────────────────────────
  if (node.extra_type === 'deal') {
    const card = `
      <div class="deal-card">
        <div class="deal-parties">${esc(node.deal_company_1 || '')} × ${esc(node.deal_company_2 || '')}</div>
        <div class="deal-value">${esc(node.deal_value || 'Undisclosed')} &nbsp;·&nbsp; ${esc(node.deal_type || '')} &nbsp;·&nbsp; ${esc(node.deal_year || '')}</div>
        <div class="deal-desc">${esc(node.deal_description || '')}</div>
      </div>`;
    body.appendChild(section('Deal Details', card));
  }

  // ── PARTNERSHIP OPPORTUNITY ───────────────────────────────────────────────
  if (node.opp_data && Object.keys(node.opp_data).length) {
    const o = node.opp_data;
    let html = '';
    if (o.relevance)        html += `<p class="panel-text" style="margin-bottom:8px"><strong style="color:${color}">Relevance:</strong> ${esc(o.relevance)}</p>`;
    if (o.scientific_fit)   html += `<p class="panel-text" style="margin-bottom:8px"><strong>Scientific Fit:</strong> ${esc(o.scientific_fit)}</p>`;
    if (o.business_fit)     html += `<p class="panel-text" style="margin-bottom:8px"><strong>Business Fit:</strong> ${esc(o.business_fit)}</p>`;
    if (o.why_this_company) html += `<p class="panel-text" style="margin-bottom:8px"><strong>Why Partner:</strong> ${esc(o.why_this_company)}</p>`;
    if (o.deal_rationale)   html += `<p class="panel-text"><strong>Deal Rationale:</strong> ${esc(o.deal_rationale)}</p>`;
    if (html) body.appendChild(section('Partnership Opportunity', html));
  }

  // ── ROOT NODE EXTRAS ──────────────────────────────────────────────────────
  if (node.extra_type === 'root') {
    if (node.next_direction) {
      body.appendChild(section('Next Direction', `<p class="panel-text">${esc(node.next_direction)}</p>`));
    }
    if (graphMeta.trend) {
      body.appendChild(section('Growth Trend', `<p class="panel-text">${esc(graphMeta.trend)}</p>`));
    }
    if (graphMeta.total_deals !== undefined) {
      body.appendChild(section('Deal Activity', `<p class="panel-text">${graphMeta.total_deals} major deals tracked in this cycle.</p>`));
    }
  }

  // ── STAGE EVIDENCE ────────────────────────────────────────────────────────
  if (node.extra_type === 'stage' && node.evidence && node.evidence.length) {
    const html = node.evidence.map(e => `<p class="panel-text" style="margin-bottom:6px">• ${esc(e)}</p>`).join('');
    body.appendChild(section('Evidence', html));
  }

  // ── CONNECTED NODES ───────────────────────────────────────────────────────
  const connected = nodes ? nodes.filter(n => connectedIds.has(n.id) && n.id !== node.id) : [];
  if (connected.length) {
    const items = connected.map(n => {
      const c = colorOf(n.type);
      return `<div class="conn-item"><div class="conn-dot" style="background:${c}"></div>${esc(n.label)}</div>`;
    }).join('');
    body.appendChild(section(`Connected (${connected.length})`, items));
  }

  panel.classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
}

document.getElementById('panelClose').onclick = () => {
  closePanel();
  clearHighlights();
  selectedId = null;
};

function section(label, html) {
  const div = document.createElement('div');
  div.className = 'panel-section';
  div.innerHTML = `<div class="section-label">${esc(label)}</div>${html}`;
  return div;
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
</script>
